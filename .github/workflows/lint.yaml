name: golangci-lint

on:
  push:
  pull_request:

jobs:
  golangci:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-go@v6.4.0
        with:
          go-version: '1.26.3'
      - uses: actions/checkout@v6.0.3
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9.2.1
